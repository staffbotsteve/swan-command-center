app = "swan-notebooklm"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Cookies are injected via COOKIES_TXT_B64 secret (set with `fly secrets set
# COOKIES_TXT_B64=$(base64 -i cookies.txt)`). The app decodes them to
# /tmp/cookies.txt on startup. No persistent volume needed.
